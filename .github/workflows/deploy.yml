name: Auto Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      PORT: ${{ vars.PORT }}
    steps:
      - name: Deploy and build on server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            container_name=${{ github.event.repository.name }}
            app_dir="/opt/$container_name"
            env_file="$app_dir/.env"
            repo_dir="$app_dir/repo"
            port_mapping="127.0.0.1:${PORT:-3000}:3000"

            mkdir -p "$app_dir"
            echo "${{ vars.ENV }}" > "$env_file"

            rm -rf "$repo_dir"
            git clone --depth 1 https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git "$repo_dir"
            cd "$repo_dir"

            docker build -t "$container_name:${{ github.sha }}" .

            if [ "$(docker ps -aq -f name=$container_name)" ]; then
              docker rm -f "$container_name"
            fi

            docker run -d --name "$container_name" \
              --restart unless-stopped \
              --env-file "$env_file" \
              -v "$env_file:/app/.env" \
              -p "$port_mapping" \
              "$container_name:${{ github.sha }}"
